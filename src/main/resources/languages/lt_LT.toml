"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Portalų pagalba: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Naudokite portalo lazdelę portale, kad keistumėte jo tikslą, vaizdą, keliavimą ir prieigą."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Gavote portalo lazdelę ir 1 kirmgraužos runą.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Sukurkite DVI kirmgraužos runų formas (bet kokią sujungtą formą ant vieno lygaus paviršiaus), susiekite jas ir stovėkite ne toliau kaip 16 blokų, kad matytumėte projekciją.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Visus veiksmus rasite įvykdę <white>/wormholes info<gray>."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Momentinės kopijos failas: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Stebėkite šį failą, kad bendrintumėte tiesioginę tinklo ir vaizdų būseną. Jis pakeičiamas kiekvienu intervalu."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Kaip pastatyti kirmgraužą</bold>","<dark_gray>1. <gray>Gaukite portalo lazdelę ir portalo runų iš serverio arba administratoriaus.","<dark_gray>2. <gray>Sudėkite runas į bet kokią sujungtą formą ant vieno lygaus paviršiaus.","<gray>   Tinka bet kokia sujungta forma: stačiakampis, linija (3x1), vienas blokas, L forma ar kryžius.","<gray>   Runos turi gulėti ant tos pačios su ašimis lygiagrečios sienos, grindų arba lubų.","<dark_gray>3. <gray>Laikykite portalo lazdelę ir <white>kairiuoju pelės mygtuku spustelėkite runos bloką<gray>, kad sukurtumėte portalą.","<gray>   Runos automatiškai grąžinamos, jei forma nėra ant vieno lygaus paviršiaus.","<dark_gray>4. <gray>Kitur pastatykite ANTRĄ portalą (bet kokiu atstumu ir bet kuriame pasaulyje).","<dark_gray>5. <gray>Spustelėkite atvertą portalą lazdele, kad atidarytumėte pagrindinį meniu.","<gray>   Pasirinkite <white>Tikslas<gray> ir kitą portalą. Pakartokite iš kitos pusės.","<gray>   Krypties ir prieigos valdikliai pateikiami atskiruose paprastuose meniu.","<dark_gray>6. <gray>Stovėkite ne toliau kaip 16 blokų nuo vieno portalo — tikslinis pasaulis bus projektuojamas rėme, o įžengę teleportuositės.","<gray>Administratoriai gali kurti daiktus su <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Dimensijų durys gaminamos iš kirmgraužos runų. Atverkite pastatytas duris ir fiziškai perženkite slenkstį; užvertos durys niekada neįsijungia."]
