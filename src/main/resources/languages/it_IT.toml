"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Guida ai portali: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Usa la Bacchetta del Portale su un portale per impostare destinazione, vista, viaggio e accesso."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Hai ricevuto una Bacchetta del Portale e 1 Runa Wormhole.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Costruisci DUE forme con rune wormhole (qualsiasi forma collegata su una superficie piana), collegale e resta entro 16 blocchi per vedere la proiezione.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Esegui <white>/wormholes info<gray> per vedere tutti i passaggi."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>File dell'istantanea: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Monitora questo file per condividere lo stato in tempo reale della rete e delle viste. Viene sostituito a ogni intervallo."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Come costruire un wormhole</bold>","<dark_gray>1. <gray>Ottieni una Bacchetta del Portale e rune del portale dal server o da un amministratore.","<dark_gray>2. <gray>Disponi le rune in una forma collegata su una superficie piana.","<gray>   Funziona qualsiasi forma collegata: rettangoli, linee (3x1), blocchi singoli, forme a L e croci.","<gray>   Le rune devono essere piatte sulla stessa parete, pavimento o soffitto allineato agli assi.","<dark_gray>3. <gray>Tieni la Bacchetta del Portale e <white>fai clic sinistro su un blocco runa<gray> per formare il portale.","<gray>   Le rune delle forme che non sono piatte su un'unica superficie vengono restituite automaticamente.","<dark_gray>4. <gray>Costruisci un SECONDO portale altrove (a qualsiasi distanza e in qualsiasi mondo).","<dark_gray>5. <gray>Fai clic sul portale aperto con la bacchetta per aprire il menu principale.","<gray>   Scegli <white>Destinazione<gray> e seleziona l'altro portale. Ripeti dall'altro lato.","<gray>   Orientamento e accesso sono raggruppati in menu semplici separati.","<dark_gray>6. <gray>Resta entro 16 blocchi da uno dei portali — il mondo di destinazione viene proiettato nella cornice ed entrarci ti teletrasporta.","<gray>Gli amministratori possono creare oggetti con <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Le Porte Dimensionali si fabbricano con Rune Wormhole. Apri una porta posizionata e attraversane fisicamente la soglia; una porta chiusa non si attiva mai."]
