"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>포털 도움말: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>포털에 포털 지팡이를 사용하면 목적지, 보기, 이동 및 접근 설정을 열 수 있습니다."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>포털 지팡이와 웜홀 룬 1개를 지급했습니다.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>웜홀 룬 모양 2개(한 평면에 연결된 어떤 모양이든 가능)를 만들어 연결한 뒤, 16블록 안에 서면 투영을 볼 수 있습니다.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>전체 단계별 안내는 <white>/wormholes info<gray>에서 확인하세요."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>스냅샷 파일: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>이 파일을 모니터링하면 실시간 네트워크 및 보기 상태를 확인할 수 있습니다. 파일은 주기마다 덮어씁니다."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>웜홀 만드는 방법</bold>","<dark_gray>1. <gray>서버 또는 관리자에게서 포털 지팡이와 포털 룬을 받습니다.","<dark_gray>2. <gray>한 평면에 룬을 서로 연결된 모양으로 배치합니다.","<gray>   직사각형, 직선 (3x1), 단일 블록, L자, 십자 등 연결된 모양이면 됩니다.","<gray>   룬은 좌표축에 맞는 하나의 벽, 바닥 또는 천장에 평평하게 놓여야 합니다.","<dark_gray>3. <gray>포털 지팡이를 들고 <white>아무 룬 블록이나 왼쪽 클릭<gray>하여 포털을 만듭니다.","<gray>   한 평면에 놓이지 않은 모양은 자동으로 환불됩니다.","<dark_gray>4. <gray>다른 위치에 두 번째 포털을 만듭니다(거리와 월드는 무관합니다).","<dark_gray>5. <gray>지팡이로 열린 포털을 클릭해 주 메뉴를 엽니다.","<gray>   <white>목적지<gray>를 선택하고 다른 포털을 지정합니다. 반대쪽에서도 반복합니다.","<gray>   방향과 접근 설정은 각각 별도의 간단한 메뉴에 있습니다.","<dark_gray>6. <gray>두 포털 중 하나에서 16블록 안에 서면 목적지 월드가 프레임에 투영되며, 안으로 걸어가면 순간이동합니다.","<gray>관리자는 <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n> 명령으로 아이템을 만들 수 있습니다","<gray>차원문은 웜홀 룬으로 제작합니다. 설치한 문을 열고 문턱을 직접 넘어가면 이동하며, 닫힌 문은 작동하지 않습니다."]
