"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>עזרה לפורטל: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>השתמשו במטה הפורטל על פורטל כדי לפתוח את הגדרות היעד, התצוגה, המעבר והגישה שלו."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>הוענקו מטה פורטל ו-1 רונת חור תולעת.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>בנו שתי צורות של רונות חור תולעת (כל צורה מחוברת על משטח שטוח אחד), קשרו ביניהן ועמדו בטווח של 16 בלוקים כדי לראות את ההקרנה.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>הריצו <white>/wormholes info<gray> לקבלת הוראות מלאות שלב אחר שלב."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>קובץ תמונת מצב: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>עקבו אחר סוף הקובץ כדי לשתף מצב רשת ותצוגה בזמן אמת. הקובץ נכתב מחדש בכל מרווח זמן."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>כיצד לבנות חור תולעת</bold>","<dark_gray>1. <gray>קבלו מטה פורטל ורונות פורטל מהשרת או ממנהל.","<dark_gray>2. <gray>הניחו את הרונות בצורה מחוברת כלשהי על משטח שטוח אחד.","<gray>   כל צורה מחוברת מתאימה: מלבנים, קווים (3x1), בלוק יחיד, צורת L וצלבים.","<gray>   הרונות חייבות להיות שטוחות על קיר, רצפה או תקרה אחת המיושרים לציר.","<dark_gray>3. <gray>החזיקו את מטה הפורטל ו<white>לחצו שמאל על בלוק רונה כלשהו<gray> כדי ליצור את הפורטל.","<gray>   צורות שאינן שטוחות על משטח אחד מוחזרות אוטומטית.","<dark_gray>4. <gray>בנו פורטל שני במקום אחר (בכל מרחק ובכל עולם).","<dark_gray>5. <gray>לחצו על הפורטל הפתוח עם המטה כדי לפתוח את התפריט הראשי.","<gray>   בחרו <white>יעד<gray> ובחרו את הפורטל האחר. חזרו על הפעולה מהצד השני.","<gray>   הגדרות הכיוון והגישה נמצאות בתפריטים פשוטים ונפרדים.","<dark_gray>6. <gray>עמדו בטווח של 16 בלוקים מאחד הפורטלים; עולם היעד יוקרן דרך המסגרת וכניסה אליה תטלפרט אתכם.","<gray>מנהלים יכולים ליצור פריטים בעזרת <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>דלתות ממד מיוצרות מרונות חור תולעת. פתחו דלת מוצבת וחצו פיזית את המפתן כדי לעבור; דלת סגורה לעולם אינה מופעלת."]
