"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>传送门帮助：<white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>对传送门使用传送门法杖，可打开目的地、视图、通行和访问控制。"]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>已给予传送门法杖和 1 枚虫洞符文。","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>搭建两个虫洞符文形状(同一平面上的任意相连形状)，将它们链接，并站在 16 个方块内查看投影。","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>运行 <white>/wormholes info<gray> 查看完整分步说明。"]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>快照文件：<white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>持续查看此文件可共享实时网络与视图状态。每个周期都会原地覆盖该文件。"]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>如何建造虫洞</bold>","<dark_gray>1. <gray>从服务器或管理员处获得传送门法杖和传送门符文。","<dark_gray>2. <gray>在同一平面上将符文摆成任意相连形状。","<gray>   任意相连形状都可以：矩形、直线 (3x1)、单个方块、L 形和十字形。","<gray>   符文必须平整地位于同一面与坐标轴对齐的墙、地板或天花板上。","<dark_gray>3. <gray>手持传送门法杖，<white>左键点击任意符文方块<gray>以构建传送门。","<gray>   不在同一平面上的形状会自动返还符文。","<dark_gray>4. <gray>在其他位置建造第二个传送门(距离和世界不限)。","<dark_gray>5. <gray>手持法杖点击已开启的传送门，打开主菜单。","<gray>   选择<white>目的地<gray>并选中另一个传送门，然后在另一端重复此操作。","<gray>   方向和访问控制分别位于各自的简洁菜单中。","<dark_gray>6. <gray>站在任一传送门 16 个方块内，目的地世界会投影在框架中；走入框架即可传送。","<gray>管理员可使用 <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n> 创建物品","<gray>维度门使用虫洞符文合成。打开已放置的门并亲自跨过门槛即可通行；关闭的门绝不会激活。"]
