"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Trợ giúp cổng dịch chuyển: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Dùng gậy cổng dịch chuyển lên cổng để mở các tùy chọn điểm đến, khung nhìn, di chuyển và truy cập."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Đã cấp gậy cổng dịch chuyển và 1 rune lỗ sâu.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Tạo hai hình rune lỗ sâu (bất kỳ hình nối liền nào trên cùng bề mặt phẳng), liên kết chúng và đứng trong phạm vi 16 khối để xem hình chiếu.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Chạy <white>/wormholes info<gray> để xem hướng dẫn đầy đủ từng bước."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Tệp ảnh chụp: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Theo dõi cuối tệp này để chia sẻ trạng thái mạng và khung nhìn trực tiếp. Tệp được ghi đè tại chỗ theo từng khoảng thời gian."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Cách xây lỗ sâu</bold>","<dark_gray>1. <gray>Nhận gậy cổng dịch chuyển và rune cổng từ máy chủ hoặc quản trị viên.","<dark_gray>2. <gray>Đặt rune thành một hình nối liền trên cùng bề mặt phẳng.","<gray>   Mọi hình nối liền đều dùng được: hình chữ nhật, đường thẳng (3x1), một khối, hình chữ L và hình chữ thập.","<gray>   Rune phải nằm phẳng trên cùng một mặt tường, sàn hoặc trần thẳng theo trục tọa độ.","<dark_gray>3. <gray>Cầm gậy cổng dịch chuyển và <white>nhấp trái vào rune bất kỳ<gray> để tạo cổng.","<gray>   Hình không nằm trên cùng một mặt phẳng sẽ tự động được hoàn rune.","<dark_gray>4. <gray>Xây cổng thứ hai ở nơi khác (không giới hạn khoảng cách hoặc thế giới).","<dark_gray>5. <gray>Dùng gậy nhấp vào cổng đang mở để mở trình đơn chính.","<gray>   Chọn <white>Điểm đến<gray> rồi chọn cổng còn lại. Lặp lại ở phía bên kia.","<gray>   Hướng và quyền truy cập nằm trong các trình đơn riêng, đơn giản.","<dark_gray>6. <gray>Đứng trong phạm vi 16 khối của một trong hai cổng; thế giới đích sẽ chiếu qua khung và bạn sẽ dịch chuyển khi bước vào.","<gray>Quản trị viên có thể tạo vật phẩm bằng <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Cửa không gian được chế tạo bằng rune lỗ sâu. Mở cửa đã đặt và bước qua ngưỡng để di chuyển; cửa đóng sẽ không kích hoạt."]
