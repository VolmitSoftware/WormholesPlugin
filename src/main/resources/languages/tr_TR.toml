"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Portal yardımı: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Hedef, görünüm, seyahat ve erişim ayarlarını açmak için portal asasını portalda kullanın."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Portal asası ve 1 solucan deliği rünü verildi.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>İki solucan deliği rünü şekli oluşturun (tek düz yüzeyde bağlantılı herhangi bir şekil), bunları bağlayın ve projeksiyonu görmek için 16 blok içinde durun.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Tüm adımları görmek için <white>/wormholes info<gray> komutunu çalıştırın."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Anlık görüntü dosyası: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Canlı ağ ve görünüm durumunu izlemek için bu dosyayı takip edin. Dosya her döngüde yerinde yeniden yazılır."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Solucan deliği nasıl yapılır</bold>","<dark_gray>1. <gray>Sunucudan veya bir yöneticiden portal asası ve portal rünleri alın.","<dark_gray>2. <gray>Rünleri aynı düz yüzeyde bağlantılı herhangi bir şekle yerleştirin.","<gray>   Dikdörtgen, çizgi (3x1), tek blok, L şekli ve haç gibi tüm bağlantılı şekiller çalışır.","<gray>   Rünler eksenlere hizalı tek bir duvar, zemin veya tavanda düz durmalıdır.","<dark_gray>3. <gray>Portal asasını tutup <white>herhangi bir rün bloğuna sol tıklayarak<gray> portalı oluşturun.","<gray>   Tek bir yüzeyde düz durmayan şekiller otomatik olarak iade edilir.","<dark_gray>4. <gray>Başka bir yerde ikinci bir portal oluşturun (mesafe ve dünya fark etmez).","<dark_gray>5. <gray>Ana menüyü açmak için açık portala asayla tıklayın.","<gray>   <white>Hedef<gray> seçeneğini açıp diğer portalı seçin. Öteki tarafta da tekrarlayın.","<gray>   Yön ve erişim ayarları ayrı, basit menülerde gruplanmıştır.","<dark_gray>6. <gray>Portallardan birinin 16 blok yakınında durun; hedef dünya çerçevede görünür ve içeri yürüdüğünüzde ışınlanırsınız.","<gray>Yöneticiler <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n> komutuyla malzeme oluşturabilir","<gray>Boyut Kapıları solucan deliği rünleriyle yapılır. Yerleştirilmiş kapıyı açıp eşiğinden fiziksel olarak geçin; kapalı kapı asla etkinleşmez."]
