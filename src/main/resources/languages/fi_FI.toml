"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Portaaliohje: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Käytä portaalisauvaa portaaliin avataksesi kohteen, näkymän, matkustamisen ja käyttöoikeuksien asetukset."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Sait portaalisauvan ja 1 madonreikäriimun.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Rakenna KAKSI madonreikäriimukuviota (mikä tahansa yhtenäinen kuvio yhdellä tasaisella pinnalla), linkitä ne ja pysy 16 lohkon sisällä nähdäksesi projektion.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Katso kaikki vaiheet komennolla <white>/wormholes info<gray>."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Tilastotiedosto: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Seuraa tätä tiedostoa jakaaksesi verkon ja näkymien reaaliaikaisen tilan. Tiedosto korvataan jokaisella aikavälillä."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Madonreiän rakentaminen</bold>","<dark_gray>1. <gray>Hanki portaalisauva ja portaaliriimuja palvelimelta tai ylläpitäjältä.","<dark_gray>2. <gray>Aseta riimut yhtenäiseksi kuvioksi yhdelle tasaiselle pinnalle.","<gray>   Mikä tahansa yhtenäinen kuvio toimii: suorakulmio, viiva (3x1), yksittäinen lohko, L-kuvio tai risti.","<gray>   Riimujen on oltava tasaisesti samalla akselinsuuntaisella seinällä, lattialla tai katossa.","<dark_gray>3. <gray>Pidä portaalisauvaa ja <white>napsauta mitä tahansa riimulohkoa vasemmalla<gray> muodostaaksesi portaalin.","<gray>   Riimut palautetaan automaattisesti, jos kuvio ei ole samalla tasaisella pinnalla.","<dark_gray>4. <gray>Rakenna TOINEN portaali muualle (mille tahansa etäisyydelle, mihin tahansa maailmaan).","<dark_gray>5. <gray>Avaa päävalikko napsauttamalla avointa portaalia sauvalla.","<gray>   Valitse <white>Kohde<gray> ja sitten toinen portaali. Toista sama toiselta puolelta.","<gray>   Suuntaus ja käyttöoikeudet ovat omissa selkeissä valikoissaan.","<dark_gray>6. <gray>Pysy 16 lohkon sisällä jommastakummasta portaalista — kohdemaailma projisoituu kehykseen ja sisään astuminen teleporttaa sinut.","<gray>Ylläpitäjät voivat luoda tarvikkeita komennolla <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Ulottuvuusovet valmistetaan madonreikäriimuista. Avaa asetettu ovi ja ylitä sen kynnys fyysisesti; suljettu ovi ei koskaan aktivoidu."]
