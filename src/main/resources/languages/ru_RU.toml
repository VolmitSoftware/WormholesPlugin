"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Справка по порталам: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Используйте жезл портала на портале, чтобы открыть настройки назначения, вида, перемещения и доступа."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Выданы жезл портала и 1 руна червоточины.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Создайте две фигуры из рун червоточины (любая связанная фигура на одной плоской поверхности), свяжите их и встаньте в пределах 16 блоков, чтобы увидеть проекцию.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Полная пошаговая инструкция доступна по команде <white>/wormholes info<gray>."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Файл снимка: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Следите за этим файлом для просмотра состояния сети и проекций в реальном времени. Файл перезаписывается каждый цикл."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Как построить червоточину</bold>","<dark_gray>1. <gray>Получите жезл портала и руны портала на сервере или у администратора.","<dark_gray>2. <gray>Разместите руны в виде любой связанной фигуры на одной плоскости.","<gray>   Подойдут прямоугольники, линии (3x1), одиночные блоки, Г-образные фигуры и кресты.","<gray>   Руны должны лежать на одной выровненной по осям стене, полу или потолке.","<dark_gray>3. <gray>Возьмите жезл портала и <white>нажмите левой кнопкой по любой руне<gray>, чтобы создать портал.","<gray>   Руны фигур, не лежащих в одной плоскости, возвращаются автоматически.","<dark_gray>4. <gray>Постройте второй портал в другом месте (на любом расстоянии и в любом мире).","<dark_gray>5. <gray>Нажмите жезлом на открытый портал, чтобы открыть главное меню.","<gray>   Выберите <white>Назначение<gray> и укажите другой портал. Повторите с другой стороны.","<gray>   Настройки ориентации и доступа находятся в отдельных простых меню.","<dark_gray>6. <gray>Встаньте в пределах 16 блоков от любого портала: мир назначения появится в рамке, а вход в неё телепортирует вас.","<gray>Администраторы могут создавать предметы командой <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Двери измерений создаются из рун червоточины. Откройте установленную дверь и физически пересеките порог; закрытая дверь не активируется."]
