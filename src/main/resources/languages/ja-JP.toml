"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>ポータルのヘルプ: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>ポータルにポータルワンドを使うと、目的地、表示、移動、アクセス設定を開けます。"]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>ポータルワンドとワームホールルーン 1 個を付与しました。","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>ワームホールルーンの形を 2 つ(同じ平面上の任意のつながった形)作ってリンクし、16 ブロック以内に立つと投影が見えます。","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>詳しい手順は <white>/wormholes info<gray> で確認できます。"]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>スナップショットファイル: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>このファイルを監視すると、ネットワークとビューの状態をリアルタイムで確認できます。ファイルは周期ごとに上書きされます。"]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>ワームホールの作り方</bold>","<dark_gray>1. <gray>サーバーまたは管理者からポータルワンドとポータルルーンを入手します。","<dark_gray>2. <gray>同じ平面上に、ルーンを任意のつながった形で配置します。","<gray>   長方形、直線 (3x1)、単一ブロック、L 字形、十字形など、つながった形なら使用できます。","<gray>   ルーンは、座標軸に沿った 1 枚の壁、床、または天井上に平らに配置してください。","<dark_gray>3. <gray>ポータルワンドを持ち、<white>任意のルーンブロックを左クリック<gray>してポータルを形成します。","<gray>   1 つの平面上に収まらない形は、自動的に払い戻されます。","<dark_gray>4. <gray>別の場所に 2 つ目のポータルを作ります(距離とワールドは問いません)。","<dark_gray>5. <gray>開いたポータルをワンドでクリックし、メインメニューを開きます。","<gray>   <white>目的地<gray>を選び、もう一方のポータルを指定します。反対側でも同じ操作を行います。","<gray>   向きとアクセス設定は、それぞれ専用の簡単なメニューにまとまっています。","<dark_gray>6. <gray>どちらかのポータルから 16 ブロック以内に立つと、目的地のワールドがフレーム内に投影され、入るとテレポートします。","<gray>管理者は <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n> でアイテムを作成できます","<gray>ディメンションドアはワームホールルーンで作成します。設置したドアを開いて実際に敷居を越えると移動でき、閉じたドアは作動しません。"]
"item.portal_wand" = ["<gold><bold>ポータルワンド</bold>"]
