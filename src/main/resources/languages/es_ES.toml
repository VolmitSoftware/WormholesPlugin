"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Ayuda de portales: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Usa la Varita del Portal sobre un portal para configurar el destino, la vista, el viaje y el acceso."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Has recibido una Varita del Portal y 1 Runa de Agujero de Gusano.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Construye DOS formas con runas de agujero de gusano (cualquier forma conectada sobre una superficie plana), enlázalas y permanece a menos de 16 bloques para ver la proyección.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Ejecuta <white>/wormholes info<gray> para consultar todos los pasos."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Archivo de instantánea: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Observa este archivo para compartir el estado en vivo de la red y las vistas. Se reemplaza en cada intervalo."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Cómo construir un agujero de gusano</bold>","<dark_gray>1. <gray>Obtén una Varita del Portal y runas de portal del servidor o de un administrador.","<dark_gray>2. <gray>Coloca las runas formando cualquier figura conectada sobre una superficie plana.","<gray>   Sirve cualquier figura conectada: rectángulos, líneas (3x1), bloques individuales, formas de L y cruces.","<gray>   Las runas deben quedar planas en una misma pared, suelo o techo alineado con los ejes.","<dark_gray>3. <gray>Sujeta la Varita del Portal y <white>haz clic izquierdo en cualquier bloque de runa<gray> para formar el portal.","<gray>   Las figuras que no estén planas sobre una sola superficie devolverán las runas automáticamente.","<dark_gray>4. <gray>Construye un SEGUNDO portal en otro lugar (a cualquier distancia y en cualquier mundo).","<dark_gray>5. <gray>Haz clic en el portal abierto con la varita para abrir el menú principal.","<gray>   Elige <white>Destino<gray> y selecciona el otro portal. Repite la operación desde el otro lado.","<gray>   La orientación y el acceso se agrupan en sus propios menús sencillos.","<dark_gray>6. <gray>Permanece a menos de 16 bloques de cualquiera de los portales — el mundo de destino se proyectará en el marco y entrar te teletransportará.","<gray>Los administradores pueden crear objetos con <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Las Puertas Dimensionales se fabrican con Runas de Agujero de Gusano. Abre una puerta colocada y cruza físicamente su umbral; una puerta cerrada nunca se activa."]
