"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Pomoc dotycząca portali: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Użyj Różdżki Portalu na portalu, aby ustawić cel, widok, podróż i dostęp."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Otrzymano Różdżkę Portalu i 1 Runę Tunelu Czasoprzestrzennego.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Zbuduj DWA kształty z run tunelu czasoprzestrzennego (dowolny połączony kształt na jednej płaskiej powierzchni), połącz je i stań w odległości 16 bloków, aby zobaczyć projekcję.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Wykonaj <white>/wormholes info<gray>, aby zobaczyć wszystkie kroki."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Plik migawki: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Obserwuj ten plik, aby udostępniać bieżący stan sieci i widoków. Jest zastępowany w każdym interwale."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Jak zbudować tunel czasoprzestrzenny</bold>","<dark_gray>1. <gray>Zdobądź Różdżkę Portalu i runy portalu od serwera lub administratora.","<dark_gray>2. <gray>Ułóż runy w dowolny połączony kształt na jednej płaskiej powierzchni.","<gray>   Działa każdy połączony kształt: prostokąt, linia (3x1), pojedynczy blok, litera L lub krzyż.","<gray>   Runy muszą leżeć płasko na tej samej ścianie, podłodze lub suficie wyrównanym do osi.","<dark_gray>3. <gray>Trzymaj Różdżkę Portalu i <white>kliknij lewym przyciskiem blok runy<gray>, aby utworzyć portal.","<gray>   Runy z kształtów, które nie leżą na jednej płaskiej powierzchni, są automatycznie zwracane.","<dark_gray>4. <gray>Zbuduj DRUGI portal w innym miejscu (w dowolnej odległości i w dowolnym świecie).","<dark_gray>5. <gray>Kliknij otwarty portal różdżką, aby otworzyć menu główne.","<gray>   Wybierz <white>Cel<gray> i drugi portal. Powtórz po drugiej stronie.","<gray>   Orientacja i dostęp znajdują się w oddzielnych, prostych menu.","<dark_gray>6. <gray>Stań w odległości 16 bloków od jednego z portali — świat docelowy pojawi się w ramie, a wejście do niej cię teleportuje.","<gray>Administratorzy mogą tworzyć przedmioty poleceniem <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Drzwi Wymiarowe powstają z Run Tunelu Czasoprzestrzennego. Otwórz postawione drzwi i fizycznie przekrocz próg; zamknięte drzwi nigdy się nie aktywują."]
