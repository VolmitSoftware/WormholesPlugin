"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Portalhilfe: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Benutze den Portalstab an einem Portal, um Ziel, Ansicht, Reise und Zugriff einzustellen."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Portalstab und 1 Wurmlochrune erhalten.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Baue ZWEI Formen aus Wurmlochrunen (eine beliebige zusammenhängende Form auf einer flachen Oberfläche), verknüpfe sie und bleibe innerhalb von 16 Blöcken, um die Projektion zu sehen.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Führe <white>/wormholes info<gray> aus, um die vollständige Anleitung zu sehen."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Snapshot-Datei: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Beobachte diese Datei, um den Live-Status des Netzwerks und der Ansichten zu teilen. Sie wird in jedem Intervall ersetzt."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>So baust du ein Wurmloch</bold>","<dark_gray>1. <gray>Hole dir einen Portalstab und Portalrunen vom Server oder von einem Administrator.","<dark_gray>2. <gray>Platziere die Runen als beliebige zusammenhängende Form auf einer flachen Oberfläche.","<gray>   Jede zusammenhängende Form funktioniert: Rechtecke, Linien (3x1), einzelne Blöcke, L-Formen und Kreuze.","<gray>   Die Runen müssen flach auf derselben achsenparallelen Wand, demselben Boden oder derselben Decke liegen.","<dark_gray>3. <gray>Halte den Portalstab und <white>klicke mit links auf einen Runenblock<gray>, um das Portal zu bilden.","<gray>   Formen, die nicht flach auf einer Oberfläche liegen, werden automatisch zurückerstattet.","<dark_gray>4. <gray>Baue an einer anderen Stelle ein ZWEITES Portal (beliebige Entfernung, beliebige Welt).","<dark_gray>5. <gray>Klicke mit dem Stab auf das offene Portal, um das Hauptmenü zu öffnen.","<gray>   Wähle <white>Ziel<gray> und dann das andere Portal. Wiederhole dies auf der anderen Seite.","<gray>   Ausrichtung und Zugriff sind in eigenen übersichtlichen Menüs angeordnet.","<dark_gray>6. <gray>Bleibe innerhalb von 16 Blöcken eines Portals — die Zielwelt wird durch den Rahmen projiziert und beim Hineingehen wirst du teleportiert.","<gray>Administratoren können Gegenstände mit <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n> erstellen","<gray>Dimensionstüren werden aus Wurmlochrunen hergestellt. Öffne eine platzierte Tür und überschreite ihre Schwelle; eine geschlossene Tür wird niemals aktiviert."]
