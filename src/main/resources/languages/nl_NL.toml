"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Portaalhulp: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Gebruik de portaalstaf op een portaal om bestemming, weergave, reizen en toegang in te stellen."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Je hebt een portaalstaf en 1 wormgatrune ontvangen.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Bouw TWEE vormen van wormgatrunen (een willekeurige verbonden vorm op één vlak oppervlak), verbind ze en blijf binnen 16 blokken om de projectie te zien.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Voer <white>/wormholes info<gray> uit voor alle stappen."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Opnamebestand: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Volg dit bestand om de live status van het netwerk en de weergaven te delen. Het wordt bij elk interval vervangen."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Een wormgat bouwen</bold>","<dark_gray>1. <gray>Haal een portaalstaf en portaalrunen bij de server of een beheerder.","<dark_gray>2. <gray>Plaats de runen in een verbonden vorm op één vlak oppervlak.","<gray>   Elke verbonden vorm werkt: rechthoeken, lijnen (3x1), losse blokken, L-vormen en kruisen.","<gray>   De runen moeten vlak op dezelfde as-uitgelijnde muur, vloer of plafond liggen.","<dark_gray>3. <gray>Houd de portaalstaf vast en <white>klik met links op een runeblok<gray> om het portaal te vormen.","<gray>   Runen van vormen die niet vlak op één oppervlak liggen, worden automatisch teruggegeven.","<dark_gray>4. <gray>Bouw ergens anders een TWEEDE portaal (op elke afstand en in elke wereld).","<dark_gray>5. <gray>Klik met de staf op het open portaal om het hoofdmenu te openen.","<gray>   Kies <white>Bestemming<gray> en selecteer het andere portaal. Herhaal dit vanaf de andere kant.","<gray>   Oriëntatie en toegang staan in afzonderlijke, eenvoudige menu's.","<dark_gray>6. <gray>Blijf binnen 16 blokken van een portaal — de doelwereld wordt in het frame geprojecteerd en naar binnen lopen teleporteert je.","<gray>Beheerders kunnen voorwerpen maken met <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Dimensiedeuren worden gemaakt met wormgatrunen. Open een geplaatste deur en stap fysiek over de drempel; een gesloten deur wordt nooit geactiveerd."]
