"item.door.paired" = ["<gold>Porte de Trou de Ver {endpoint}","<gray>Reliée automatiquement à l'extrémité {other}.","<gray>Ouvrez la porte et franchissez physiquement son seuil."]
"item.door.personal" = ["<aqua>Porte Dimensionnelle Personnelle","<gray>Chaque voyageur entre dans sa propre dimension permanente.","<gray>Un même voyageur atteint toujours le même endroit."]
"item.door.public" = ["<gold>Porte Dimensionnelle Partagée","<gray>Tous les voyageurs entrent dans la dimension partagée de cette porte.","<gray>La casser et la déplacer conserve la destination partagée."]
