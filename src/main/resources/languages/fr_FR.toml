"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Aide des portails : <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Utilisez la baguette de portail sur un portail pour régler sa destination, sa vue, le passage et l'accès."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Vous avez reçu une baguette de portail et 1 rune de trou de ver.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Construisez DEUX formes en runes de trou de ver (toute forme reliée sur une surface plane), reliez-les et restez à moins de 16 blocs pour voir la projection.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Exécutez <white>/wormholes info<gray> pour afficher toutes les étapes."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Fichier d'instantané : <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Suivez ce fichier pour partager l'état en direct du réseau et des vues. Il est remplacé à chaque intervalle."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Comment construire un trou de ver</bold>","<dark_gray>1. <gray>Obtenez une baguette de portail et des runes de portail auprès du serveur ou d'un administrateur.","<dark_gray>2. <gray>Placez les runes en une forme reliée quelconque sur une surface plane.","<gray>   Toute forme reliée fonctionne : rectangles, lignes (3x1), blocs seuls, formes en L et croix.","<gray>   Les runes doivent reposer à plat sur un même mur, sol ou plafond aligné sur les axes.","<dark_gray>3. <gray>Tenez la baguette de portail et <white>faites un clic gauche sur un bloc de rune<gray> pour former le portail.","<gray>   Les runes des formes qui ne reposent pas sur une seule surface plane sont rendues automatiquement.","<dark_gray>4. <gray>Construisez un DEUXIÈME portail ailleurs (à n'importe quelle distance et dans n'importe quel monde).","<dark_gray>5. <gray>Cliquez sur le portail ouvert avec la baguette pour ouvrir le menu principal.","<gray>   Choisissez <white>Destination<gray> puis l'autre portail. Répétez depuis l'autre côté.","<gray>   L'orientation et l'accès sont regroupés dans leurs propres menus simples.","<dark_gray>6. <gray>Restez à moins de 16 blocs de l'un des portails — le monde de destination est projeté dans le cadre et y entrer vous téléporte.","<gray>Les administrateurs peuvent créer des objets avec <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>Les Portes Dimensionnelles sont fabriquées avec des Runes de Trou de Ver. Ouvrez une porte placée et franchissez physiquement son seuil ; une porte fermée ne s'active jamais."]
