"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Ajuda de portais: <white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Use a Varinha do Portal num portal para configurar o destino, a vista, a viagem e o acesso."]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>Recebeu uma Varinha do Portal e 1 Runa de Buraco de Minhoca.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Construa DUAS formas com runas de buraco de minhoca (qualquer forma ligada numa superfície plana), ligue-as e permaneça a menos de 16 blocos para ver a projeção.","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Execute <white>/wormholes info<gray> para consultar todos os passos."]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>Ficheiro de captura: <white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>Acompanhe este ficheiro para partilhar o estado em direto da rede e das vistas. É substituído a cada intervalo."]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>Como construir um buraco de minhoca</bold>","<dark_gray>1. <gray>Obtenha uma Varinha do Portal e runas de portal junto do servidor ou de um administrador.","<dark_gray>2. <gray>Coloque as runas em qualquer forma ligada sobre uma superfície plana.","<gray>   Funciona qualquer forma ligada: retângulos, linhas (3x1), blocos individuais, formas em L e cruzes.","<gray>   As runas devem ficar planas na mesma parede, chão ou teto alinhado com os eixos.","<dark_gray>3. <gray>Segure a Varinha do Portal e <white>clique com o botão esquerdo num bloco de runa<gray> para formar o portal.","<gray>   As runas de formas que não estejam planas numa só superfície são devolvidas automaticamente.","<dark_gray>4. <gray>Construa um SEGUNDO portal noutro local (a qualquer distância e em qualquer mundo).","<dark_gray>5. <gray>Clique no portal aberto com a varinha para abrir o menu principal.","<gray>   Escolha <white>Destino<gray> e selecione o outro portal. Repita a partir do outro lado.","<gray>   A orientação e o acesso estão agrupados em menus próprios e simples.","<dark_gray>6. <gray>Permaneça a menos de 16 blocos de um dos portais — o mundo de destino será projetado na moldura e entrar irá teleportá-lo.","<gray>Os administradores podem criar itens com <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n>","<gray>As Portas Dimensionais são fabricadas com Runas de Buraco de Minhoca. Abra uma porta colocada e atravesse fisicamente o limiar; uma porta fechada nunca se ativa."]
