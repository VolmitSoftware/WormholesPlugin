"command.public_help" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>傳送門幫助：<white>/wormholes info","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>對傳送門使用傳送門法杖，可開啟目的地、檢視、通行和存取控制。"]
"command.wand.granted_starter" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <green>已給予傳送門法杖和 1 枚蟲洞符文。","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>搭建兩個蟲洞符文形狀(同一平面上的任意相連形狀)，將它們連結，並站在 16 個方塊內檢視投影。","<dark_gray>[<gold>Wormholes<dark_gray>] <gray>執行 <white>/wormholes info<gray> 查看完整的逐步說明。"]
"command.stats.path" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray>快照檔案：<white>{path}","<dark_gray>[<gold>Wormholes<dark_gray>] <dark_gray>持續檢視此檔案可共享即時網路與檢視狀態。每個週期都會原地覆蓋該檔案。"]
"command.info" = ["<dark_gray>[<gold>Wormholes<dark_gray>] <gray><bold>如何建造蟲洞</bold>","<dark_gray>1. <gray>從伺服器或管理員處獲得傳送門法杖和傳送門符文。","<dark_gray>2. <gray>在同一平面上將符文擺成任意相連形狀。","<gray>   任意相連形狀都可以：矩形、直線 (3x1)、單個方塊、L 形和十字形。","<gray>   符文必須平整地位於同一面與座標軸對齊的牆、地板或天花板上。","<dark_gray>3. <gray>手持傳送門法杖，<white>左鍵點擊任意符文方塊<gray>以建立傳送門。","<gray>   不在同一平面上的形狀會自動返還符文。","<dark_gray>4. <gray>在其他位置建造第二個傳送門(距離和世界不限)。","<dark_gray>5. <gray>手持法杖點擊已開啟的傳送門，開啟主選單。","<gray>   選擇<white>目的地<gray>並選中另一個傳送門，然後在另一端重複此操作。","<gray>   方向和存取控制分別位於各自的簡潔選單中。","<dark_gray>6. <gray>站在任一傳送門 16 個方塊內，目的地世界會投影在框架中；走入框架即可傳送。","<gray>管理員可使用 <white>/wormholes wand rune=\\<portal|wormhole|gateway> count=\\<n> 建立物品","<gray>維度門使用蟲洞符文合成。開啟已放置的門並親自跨過門檻即可通行；關閉的門絕不會啟用。"]
